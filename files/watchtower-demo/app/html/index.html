<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Watchtower Demo App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: #1e293b;
            padding: 48px 64px;
            border-radius: 16px;
            border: 1px solid #334155;
            text-align: center;
        }
        h1 { margin: 0 0 8px 0; font-size: 14px; color: #94a3b8; letter-spacing: 2px; text-transform: uppercase; }
        .version { font-size: 72px; font-weight: 800; margin: 16px 0; color: #06b6d4; }
        .meta { font-size: 13px; color: #64748b; margin-top: 24px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Demo App</h1>
        <div class="version">v1.0.0</div>
        <div class="meta">build: 2026-05-01T19:25:21Z</div>
    </div>
</body>
</html>
